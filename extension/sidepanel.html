<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ephesoft Copilot</title>
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>
    <header class="topbar">
        <div class="brand">
            <span class="logo">EC</span>
            <div>
                <h1>Ephesoft Copilot</h1>
                <p class="tag">Human always validates</p>
            </div>
        </div>
        <span id="runDot" class="run-dot idle" title="idle"></span>
    </header>

    <main>
        <section class="actions">
            <button id="fillDetailsBtn" class="btn btn-primary" title="Gather context, then fill header fields (names, amounts, dates, doc type)">Fill Details</button>
            <button id="fillLineItemsBtn" class="btn btn-primary" title="Gather context, then fill the line-item table">Fill Line Items</button>
            <button id="nextBtn" class="btn btn-secondary">Next</button>
            <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
        </section>

        <section id="resultCard" class="card result hidden">
            <div class="result-head">
                <span id="resultBadge" class="badge">—</span>
                <span id="resultTitle" class="result-title"></span>
            </div>
            <div id="resultDetail" class="result-detail"></div>
        </section>

        <section class="feed-wrap">
            <div class="feed-head">
                <span>Activity</span>
                <div class="feed-controls">
                    <button id="resetSession" class="link link-warning" title="Clear cached screenshots/session and reconnect to the current tab">reset session</button>
                    <button id="clearFeed" class="link">clear</button>
                </div>
            </div>
            <div class="feed-container">
                <ul id="feed" class="feed"></ul>
            </div>
        </section>

        <details id="settings" class="settings">
            <summary>Settings</summary>
            <div class="settings-body">
                <label for="licenseKey">License Key</label>
                <div class="key-row">
                    <input id="licenseKey" type="password" placeholder="Paste license key..." autocomplete="off" spellcheck="false">
                    <button id="toggleLicense" class="link" type="button">show</button>
                </div>
                <div id="licenseStatus" class="license-status">No license loaded</div>

                <label for="apiKey">Gemini API key</label>
                <div class="key-row">
                    <input id="apiKey" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false">
                    <button id="toggleKey" class="link" type="button">show</button>
                </div>

                <label for="model">Model</label>
                <select id="model">
                    <option value="gemini-2.5-pro">gemini-2.5-pro (most accurate)</option>
                    <option value="gemini-2.5-flash">gemini-2.5-flash (faster/cheaper)</option>
                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                    <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                </select>

                <div class="settings-actions">
                    <button id="saveSettings" class="btn btn-small">Save</button>
                    <button id="testKey" class="btn btn-small btn-ghost">Test key</button>
                    <span id="saveMsg" class="save-msg"></span>
                </div>
                <p class="hint">Your key is stored locally in this browser profile (chrome.storage.local) and sent only to Google's Gemini API over HTTPS.</p>
            </div>
        </details>
    </main>

    <script type="module" src="sidepanel.js"></script>
</body>
</html>
