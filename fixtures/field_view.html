<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ephesoft - Field View (Mock)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
            margin: 0 auto;
        }
        .field-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .btn {
            padding: 8px 16px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Batch: EPH-MOCK-001</h1>
        
        <div class="field-group">
            <label for="document_type_dropdown">Document Type</label>
            <select id="document_type_dropdown">
                <option value="">Select...</option>
                <option value="invoice">Invoice</option>
                <option value="pharmacy">Pharmacy</option>
                <option value="estimate">Estimate</option>
                <option value="medical_records">Medical Records</option>
                <option value="claim_form">Claim Form</option>
                <option value="online_provider">Online Provider</option>
            </select>
        </div>
        
        <div class="field-group">
            <label for="invoice_date">Invoice Date</label>
            <input type="text" id="invoice_date" placeholder="MM/DD/YYYY">
        </div>
        
        <div class="field-group">
            <label for="invoice_number">Invoice Number</label>
            <input type="text" id="invoice_number" placeholder="INV-12345">
        </div>
        
        <div class="field-group">
            <label for="provider_name">Provider Name</label>
            <input type="text" id="provider_name" placeholder="Clinic Name">
        </div>
        
        <div class="field-group">
            <label for="pet_name">Pet Name</label>
            <input type="text" id="pet_name" placeholder="Max">
        </div>
        
        <div class="field-group">
            <label for="net_total">Net Total</label>
            <input type="text" id="net_total" placeholder="100.00">
        </div>
        
        <div class="field-group">
            <label for="invoice_total">Invoice Total</label>
            <input type="text" id="invoice_total" placeholder="110.00">
        </div>
        
        <h2>Line Items</h2>
        <button class="btn btn-primary" id="table_insert_row_btn">Add Row</button>
        <button class="btn btn-danger" id="table_delete_all_btn">Clear All</button>
        
        <table id="line_items_table">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Qty</th>
                    <th>Unit Cost</th>
                </tr>
            </thead>
            <tbody id="line_items_tbody">
                <!-- Rows will be inserted here -->
            </tbody>
        </table>
    </div>
    
    <script>
        // Mock functionality for testing
        document.getElementById('table_insert_row_btn').addEventListener('click', () => {
            const tbody = document.getElementById('line_items_tbody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="text" class="table_row_description" style="width: 100%;"></td>
                <td><input type="text" class="table_row_qty" style="width: 100%;"></td>
                <td><input type="text" class="table_row_unit_cost" style="width: 100%;"></td>
            `;
        });
        
        document.getElementById('table_delete_all_btn').addEventListener('click', () => {
            const tbody = document.getElementById('line_items_tbody');
            tbody.innerHTML = '';
        });
    </script>
</body>
</html>
