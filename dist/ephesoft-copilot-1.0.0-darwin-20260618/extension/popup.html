<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ephesoft Copilot</title>
    <style>
        body {
            width: 240px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 14px;
        }
        h1 { font-size: 14px; margin: 0 0 8px; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 4px 0;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .dot.on { background: #10b981; }
        .dot.off { background: #ef4444; }
        button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #2563eb; }
        p.hint { font-size: 11px; color: #6b7280; line-height: 1.35; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>Ephesoft Copilot</h1>
    <div class="row">
        <span><span id="dot" class="dot off"></span><span id="status">Disconnected</span></span>
    </div>
    <button id="reconnect">Reconnect</button>
    <p class="hint">Open the Electron panel to run Fill / Next on the active tab.</p>
    <script src="popup.js"></script>
</body>
</html>
